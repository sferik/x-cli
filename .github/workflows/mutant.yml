name: Mutant

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cli:
    name: CLI cargo mutant
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""

      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked

      - name: Mutant check
        run: cargo mutant --check --all-features --no-times

  x_api:
    name: x-api cargo mutant
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""

      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked

      - name: Mutant check
        run: cargo mutant --check --all-features --no-times --manifest-path x-api/Cargo.toml
